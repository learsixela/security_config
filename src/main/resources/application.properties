spring.application.name=Seguridad
# Puerto por defecto (opcional)
server.port=8082

# BASE DATOS
# Configuracion del datasource
spring.datasource.url=jdbc:mysql://localhost:3306/seguridad?useSSL=false&serverTimezone=UTC
spring.datasource.username=israel
spring.datasource.password=admin1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuracion de JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Configuracion Thymeleaf
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8


# Spring Security
#spring.security.user.name=admin
#spring.security.user.password=admin
#spring.security.user.roles=ADMIN

# JWT Configuration
# Clave secreta para firmar los tokens JWT
# Cambiar en producción por una clave segura más larga
app.jwt.secret=mySecretKeyForJwtTokenGenerationAndValidationPurposesOnly123456789

# Tiempo de expiración del token JWT en milisegundos (86400000 = 24 horas)
app.jwt.expiration=86400000

# Tiempo de expiración del refresh token en milisegundos (604800000 = 7 días)
app.jwt.refresh-expiration=604800000